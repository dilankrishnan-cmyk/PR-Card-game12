<!DOCTYPE html>
<html>
<head>
  <title>Ultimate Pack Ripper</title>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    body { font-family: "Comic Sans MS"; background: linear-gradient(to right, purple, blue); color: white; text-align: center; margin: 0; padding: 0;}
    button { padding: 10px; margin: 10px; background: orange; border: none; font-size: 16px; cursor: pointer;}
    input, select { padding: 10px; margin: 5px; font-size: 16px;}
    .login-image { width: 200px; animation: pulse 2s infinite;}
    @keyframes pulse {0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); }}
    .shake { animation: shake 0.3s;}
    @keyframes shake {0% { transform: translateX(-10px); } 50% { transform: translateX(10px);} 100% { transform: translateX(0);}}
    .card { width: 150px; margin: 10px;}
    .topbar { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px;}
    .coins img { width: 30px; vertical-align: middle;}
    #cards { display: flex; flex-wrap: wrap; justify-content: center;}
    #packImage { width: 200px; transition: transform 0.5s;}
    #adminUpload, #adminPackUpload { display: none; margin-top: 20px; border: 2px dashed orange; padding: 10px;}
  </style>
</head>
<body>

<!-- Login / Register -->
<div id="login">
  <h1>🔥 Ultimate Pack Ripper 🔥</h1>
  <img src="pack.png" class="login-image">
  <br>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <button id="loginBtn">Login</button>
  <button id="signupBtn">Sign Up</button>
  <p id="feedback"></p>
</div>

<!-- Game Area -->
<div id="game" style="display:none;">
  <div class="topbar">
    <div class="coins"><img src="coin.png"> <span id="coinCount">0</span></div>
    <button onclick="openPack()">Open Pack</button>
    <button onclick="loadCollection()">My Collection</button>
  </div>

  <div id="packArea"><img src="pack.png" id="packImage"></div>
  <div id="cards"></div>

  <!-- Admin Card Upload -->
  <div id="adminUpload">
    <h2>Admin: Upload New Card</h2>
    <input type="text" id="cardName" placeholder="Card Name">
    <select id="cardRarity">
      <option value="Common">Common</option>
      <option value="Rare">Rare</option>
      <option value="Legendary">Legendary</option>
    </select>
    <input type="number" id="cardOdds" placeholder="Odds %" min="1" max="100">
    <input type="file" id="cardImage">
    <br>
    <button onclick="uploadCard()">Upload Card</button>
    <p id="adminFeedback"></p>
  </div>

  <!-- Marketplace -->
  <div id="marketplace">
    <h2>Marketplace</h2>
    <div id="packList"></div>
    <p id="marketFeedback"></p>
  </div>

  <!-- Admin Pack Management -->
  <div id="adminPackUpload">
    <h2>Admin: Create Pack</h2>
    <input type="text" id="packName" placeholder="Pack Name">
    <input type="number" id="packPrice" placeholder="Price in Coins">
    <input type="number" id="packCount" placeholder="Cards per Pack" value="4">
    <br>
    <button onclick="uploadPack()">Create Pack</button>
    <p id="adminPackFeedback"></p>
  </div>
</div>

<script>
const SUPABASE_URL = "https://sb_publishable_T1zMaDDF6BWEw8dYy5jJIw_A09DQ7w2"; // replace this

</body>
</html>

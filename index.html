<!DOCTYPE html>
<html>
<head>
  <title>Ultimate Pack Ripper</title>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    body {
      font-family: "Comic Sans MS";
      background: linear-gradient(to right, purple, blue);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    button {
      padding: 10px;
      margin: 10px;
      background: orange;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    input, select {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
    }

    .login-image {
      width: 200px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .shake {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0% { transform: translateX(-10px); }
      50% { transform: translateX(10px); }
      100% { transform: translateX(0); }
    }

    .card {
      width: 150px;
      margin: 10px;
    }

    .topbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .coins img {
      width: 30px;
      vertical-align: middle;
    }

    #cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    #packImage {
      width: 200px;
      transition: transform 0.5s;
    }

    #adminUpload, #adminPackUpload {
      display: none;
      margin-top: 20px;
      border: 2px dashed orange;
      padding: 10px;
    }
  </style>
</head>
<body>

<!-- Login / Register -->
<div id="login">
  <h1>🔥 Ultimate Pack Ripper 🔥</h1>
  <img src="pack.png" class="login-image">
  <br>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <button onclick="login()">Login</button>
  <button onclick="register()">Sign Up</button>
  <p id="feedback"></p>
</div>

<!-- Game Area -->
<div id="game" style="display:none;">
  <div class="topbar">
    <div class="coins">
      <img src="coin.png"> <span id="coinCount">0</span>
    </div>
    <button onclick="openPack()">Open Pack</button>
    <button onclick="loadCollection()">My Collection</button>
  </div>

  <div id="packArea">
    <img src="pack.png" id="packImage">
  </div>

  <div id="cards"></div>

  <!-- Admin Card Upload -->
  <div id="adminUpload">
    <h2>Admin: Upload New Card</h2>
    <input type="text" id="cardName" placeholder="Card Name">
    <select id="cardRarity">
      <option value="Common">Common</option>
      <option value="Rare">Rare</option>
      <option value="Legendary">Legendary</option>
    </select>
    <input type="number" id="cardOdds" placeholder="Odds %" min="1" max="100">
    <input type="file" id="cardImage">
    <br>
    <button onclick="uploadCard()">Upload Card</button>
    <p id="adminFeedback"></p>
  </div>

  <!-- Marketplace -->
  <div id="marketplace">
    <h2>Marketplace</h2>
    <div id="packList"></div>
    <p id="marketFeedback"></p>
  </div>

  <!-- Admin Pack Management -->
  <div id="adminPackUpload">
    <h2>Admin: Create Pack</h2>
    <input type="text" id="packName" placeholder="Pack Name">
    <input type="number" id="packPrice" placeholder="Price in Coins">
    <input type="number" id="packCount" placeholder="Cards per Pack" value="4">
    <br>
    <button onclick="uploadPack()">Create Pack</button>
    <p id="adminPackFeedback"></p>
  </div>
</div>

<script>
  const SUPABASE_URL = "YOUR_SUPABASE_URL";
  const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";

  const supabase = supabase.createClient(sb_publishable_T1zMaDDF6BWEw8dYy5jJIw_A09DQ7w2, eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwbGRldG95a2dqd3hucWd1d296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MTk4MDQsImV4cCI6MjA4Nzk5NTgwNH0.L94fWOWeeGng0T_cRH3pntUtpkUyfaZZMGL6ETw7_sg);

  const ADMIN_EMAIL = "dilankrishnan@gmail.com";
  const ADMIN_PASSWORD = "PRCARDGAME";

  let user;

  // ---------- Login ----------
  async function login() {
    const emailVal = document.getElementById("email").value;
    const passVal = document.getElementById("password").value;

    // Admin auto login
    if(emailVal === ADMIN_EMAIL && passVal === ADMIN_PASSWORD){
      user = { email: ADMIN_EMAIL, id: "admin" };
      document.getElementById("login").style.display = "none";
      document.getElementById("game").style.display = "block";
      document.getElementById("adminUpload").style.display = "block";
      document.getElementById("adminPackUpload").style.display = "block";
      loadCoins();
      loadMarketplace();
      document.getElementById("feedback").innerText = "Logged in as Admin!";
      return;
    }

    // Normal users
    const { data, error } = await supabase.auth.signInWithPassword({
      email: emailVal,
      password: passVal
    });

    if(error){
      document.getElementById("feedback").innerText = error.message;
    } else {
      user = data.user;
      document.getElementById("login").style.display = "none";
      document.getElementById("game").style.display = "block";
      loadCoins();
      loadMarketplace();
    }
  }

  // ---------- Register ----------
  async function register(){
    const emailVal = document.getElementById("email").value;
    const passVal = document.getElementById("password").value;

    const { data, error } = await supabase.auth.signUp({
      email: emailVal,
      password: passVal
    });

    if(error){
      document.getElementById("feedback").innerText = error.message;
    } else {
      document.getElementById("feedback").innerText = "Registered! Please log in.";
    }
  }

  // ---------- Load Coins ----------
  async function loadCoins(){
    if(user.id === "admin"){
      document.getElementById("coinCount").innerText = "∞";
      return;
    }

    let { data } = await supabase.from('user_coins').select('*').eq('user_id', user.id).single();

    if(!data){
      await supabase.from('user_coins').insert([{ user_id: user.id, coins: 1000 }]);
      data = { coins: 1000 };
    }

    document.getElementById("coinCount").innerText = data.coins;
  }

  // ---------- Open Pack ----------
  async function openPack(){
    const packImg = document.getElementById("packImage");
    packImg.style.transform = "scale(1.2)";
    setTimeout(()=>packImg.style.transform="scale(1)", 500);

    const { data: cards } = await supabase.from('cards').select('*');
    let results = [];

    let cardCount = 4;
    for(let i=0;i<cardCount;i++){
      let rand = Math.random()*100;
      let cumulative=0;
      for(let card of cards){
        cumulative += parseFloat(card.odds);
        if(rand <= cumulative){
          results.push(card);
          if(user.id !== "admin"){
            await supabase.from('user_collection').insert([{ user_id: user.id, card_id: card.id }]);
          }
          break;
        }
      }
    }

    displayCards(results);
  }

  function displayCards(cards){
    const container = document.getElementById("cards");
    container.innerHTML = "";
    cards.forEach(card=>{
      const img = document.createElement("img");
      img.src = card.image_url;
      img.className = "card";
      container.appendChild(img);

      if(card.rarity === "Legendary"){
        confetti({particleCount:200, colors:["#ff6600"]});
        document.body.classList.add("shake");
        setTimeout(()=>document.body.classList.remove("shake"),300);
      }
    });
  }

  // ---------- Load Collection ----------
  async function loadCollection(){
    if(user.id === "admin") return;
    const { data } = await supabase.from('user_collection').select('card_id, cards(*)').eq('user_id', user.id);
    const cards = data.map(x=>x.cards);
    displayCards(cards);
  }

  // ---------- Admin Card Upload ----------
  async function uploadCard(){
    const name = document.getElementById("cardName").value;
    const rarity = document.getElementById("cardRarity").value;
    const odds = parseFloat(document.getElementById("cardOdds").value);
    const file = document.getElementById("cardImage").files[0];

    if(!name || !rarity || !odds || !file){
      document.getElementById("adminFeedback").innerText = "Fill all fields and select an image.";
      return;
    }

    const fileExt = file.name.split('.').pop();
    const fileName = `${Date.now()}.${fileExt}`;
    const { error: uploadError } = await supabase.storage.from('cards').upload(fileName, file);

    if(uploadError){
      document.getElementById("adminFeedback").innerText = "Image upload failed: "+uploadError.message;
      return;
    }

    const { publicURL } = supabase.storage.from('cards').getPublicUrl(fileName);
    const { error: insertError } = await supabase.from('cards').insert([{ name, image_url: publicURL, rarity, odds }]);

    if(insertError){
      document.getElementById("adminFeedback").innerText = "Insert failed: "+insertError.message;
      return;
    }

    document.getElementById("adminFeedback").innerText = "Card uploaded successfully!";
    document.getElementById("cardName").value = "";
    document.getElementById("cardOdds").value = "";
    document.getElementById("cardImage").value = "";
  }

  // ---------- Marketplace ----------
  async function loadMarketplace(){
    const { data: packs } = await supabase.from('packs').select('*');
    const container = document.getElementById("packList");
    container.innerHTML = "";
    if(!packs) return;

    packs.forEach(pack=>{
      const div = document.createElement("div");
      div.innerHTML = `<strong>${pack.name}</strong> - Price: ${pack.price} coins - Cards: ${pack.card_count} 
      <button onclick="buyPack('${pack.id}', ${pack.price}, ${pack.card_count})">Buy Pack</button>`;
      container.appendChild(div);
    });
  }

  async function buyPack(packId, price, cardCount){
    if(user.id === "admin"){
      openPackCount(cardCount);
      return;
    }

    const { data: userCoins } = await supabase.from('user_coins').select('*').eq('user_id', user.id).single();
    if(userCoins.coins < price){
      document.getElementById("marketFeedback").innerText = "Not enough coins!";
      return;
    }

    await supabase.from('user_coins').update({ coins: userCoins.coins - price }).eq('user_id', user.id);
    document.getElementById("coinCount").innerText = userCoins.coins - price;
    openPackCount(cardCount);
    document.getElementById("marketFeedback").innerText = "Pack purchased!";
  }

  async function openPackCount(cardCount){
    const { data: cards } = await supabase.from('cards').select('*');
    let results = [];
    for(let i=0;i<cardCount;i++){
      let rand = Math.random()*100;
      let cumulative=0;
      for(let card of cards){
        cumulative += parseFloat(card.odds);
        if(rand <= cumulative){
          results.push(card);
          if(user.id !== "admin"){
            await supabase.from('user_collection').insert([{ user_id: user.id, card_id: card.id }]);
          }
          break;
        }
      }
    }
    displayCards(results);
  }

  async function uploadPack(){
    const name = document.getElementById("packName").value;
    const price = parseInt(document.getElementById("packPrice").value);
    const count = parseInt(document.getElementById("packCount").value);

    if(!name || !price || !count){
      document.getElementById("adminPackFeedback").innerText = "Fill all fields.";
      return;
    }

    const { error } = await supabase.from('packs').insert([{ name, price, card_count: count }]);
    if(error){
      document.getElementById("adminPackFeedback").innerText = "Failed: "+error.message;
      return;
    }

    document.getElementById("adminPackFeedback").innerText = "Pack created!";
    document.getElementById("packName").value = "";
    document.getElementById("packPrice").value = "";
    document.getElementById("packCount").value = "";
    loadMarketplace();
  }
</script>

</body>
</html>
